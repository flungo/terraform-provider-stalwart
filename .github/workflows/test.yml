#
# Continuous integration: build, vet, lint, and unit-test the provider on every
# push and pull request. Acceptance tests (which require a live Stalwart
# instance) are not run here.
name: test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
      - run: go build ./...
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l -s .)" || (gofmt -l -s . && exit 1)
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # golangci-lint v2 is required to parse the v2-format .golangci.yml.
          version: v2.5.0

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
      - run: go test ./... -timeout=120s
